name: Sonic Docker Image CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ cache ]
  # schedule:
  #   - cron: '0 3 * * *' # 每天构建一次（可选）
  # schedule:
  #   - cron: '0 3 * * 1' # 每周一构建一次 (例如，每周一凌晨3点)

# 明确设置权限，避免fork仓库的权限问题
permissions:
  contents: read
  packages: write  # 推送镜像到GitHub Container Registry所需权限
  security-events: write
  actions: read

env:
  DOCKER_REPO: bailangvvking/sonic
  IMAGE_NAME: sonic
  IMAGE_TAG: cache

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on:
      # ubuntu-cache
      - self-hosted
      - linux
      - x64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # context: .
          # 调整dockerfile
          file: ./scripts/Dockerfile
          platforms: |
              linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:${{ env.IMAGE_TAG }}
          # 禁用缓存，确保每次构建都是全新的
          cache: false
          # 完全禁用所有构建缓存
          no-cache: true

      - name: Output image info
        run: |
          echo "Image built and pushed successfully"
          echo "Repository: ${{ env.DOCKER_REPO }}"
          echo "Tag: ${{ env.IMAGE_TAG }}"

      - name: Scan image for vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cache
          format: 'sarif'
          output: 'trivy-results.sarif'
          # 完全禁用所有缓存
          skip-db-update: true   # 跳过数据库更新，禁用缓存
          skip-java-db-update: true  # 跳过Java数据库更新，禁用缓存
          no-cache: true  # 禁用Trivy缓存

      - name: Upload Trivy scan results
        if: github.event_name != 'pull_request' && github.event_name != 'schedule'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'container-vulnerability-scan'

      # 扫描Go模块依赖漏洞
      - name: Scan Go dependencies for vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          skip-db-update: true
          skip-java-db-update: true
          no-cache: true

      - name: Upload Trivy FS scan results
        if: github.event_name != 'pull_request' && github.event_name != 'schedule'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'dependency-vulnerability-scan'

      # 扫描Dockerfile配置漏洞
      - name: Scan Dockerfile for vulnerabilities
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          skip-db-update: true
          skip-java-db-update: true
          no-cache: true

      - name: Upload Trivy config scan results
        if: github.event_name != 'pull_request' && github.event_name != 'schedule'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-config-results.sarif'
          category: 'config-vulnerability-scan'

      # 生成SBOM（软件物料清单）
      - name: Generate SBOM for container image
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cache
          format: 'cyclonedx'
          output: 'sbom-cyclonedx.json'
          skip-db-update: true
          skip-java-db-update: true
          no-cache: true

      - name: Upload SBOM
        if: github.event_name != 'pull_request' && github.event_name != 'schedule'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'sbom-cyclonedx.json'
          category: 'sbom'
